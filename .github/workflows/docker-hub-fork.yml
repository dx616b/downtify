# Build and push dx616b/downtify on main (fork deploy image).
name: Docker Hub (fork)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: dx616b/downtify
          annotations: |
            type=org.opencontainers.image.description,value=Self-hosted Spotify downloader with slskd and Navidrome sync
            type=org.opencontainers.image.url,value=https://github.com/dx616b/downtify
            type=org.opencontainers.image.source,value=https://github.com/dx616b/downtify
            type=org.opencontainers.image.documentation,value=https://github.com/dx616b/downtify#readme
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
